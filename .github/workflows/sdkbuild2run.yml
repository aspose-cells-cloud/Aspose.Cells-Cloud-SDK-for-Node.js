name: Run Aspose Examples

on:
  push:
    branches: ["master", "main"]
  pull_request:
    branches: ["master", "main"]

jobs:
  test:
    runs-on: windows-latest

    env:
      ProductClientId: ${{ secrets.PRODUCTCLIENTID }}
      ProductClientSecret: ${{ secrets.PRODUCTCLIENTSECRET }}

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: "18"

    - name: Install dependencies
      run: |
        npm install
        # Install TypeScript compiler if needed
        npm install ts-node typescript @types/node --no-save

    - name: Verify SDK can be loaded
      run: |
        echo "Testing SDK module load..."
        node -e "
        // Try different ways to load the module
        const paths = [
          '.',
          './src',
          './lib',
          './dist',
          require('path').resolve(__dirname, '..')
        ];

        for (const p of paths) {
          try {
            console.log('Trying path:', p);
            const mod = require(p);
            console.log('SUCCESS: Module loaded from', p);
            console.log('Type:', typeof mod);
            if (mod.CellsApi) console.log('Has CellsApi: YES');
            break;
          } catch(e) {
            // Continue to next path
          }
        }
        "

    - name: Run examples with error handling
      run: |
        # Create a simple runner for each example
        $simpleRunner = @'
        // simple-example-runner.js
        const exampleFile = process.argv[2];
        console.log(\`Running: \${exampleFile}\`);

        // Set environment
        process.env.CellsCloudClientId = process.env.ProductClientId;
        process.env.CellsCloudClientSecret = process.env.ProductClientSecret;
        process.env.CellsCloudApiBaseUrl = "https://api.aspose.cloud/v3.0";

        try {
          // Try to load the main module first
          const AsposeCellsCloud = require('../');
          global.AsposeCellsCloud = AsposeCellsCloud;
          global.model = AsposeCellsCloud;
          global.CellsApi = AsposeCellsCloud.CellsApi;

          // Run the example
          require('ts-node').register();
          require(exampleFile);
          console.log("Completed without throwing exception");
        } catch (error) {
          console.log("Error occurred:", error.message);
          // Don't exit with failure, just continue
        }
        '@

        Set-Content -Path "runner.js" -Value $simpleRunner

        # Run each example
        $total = 0
        $success = 0

        Get-ChildItem Examples\*.ts | ForEach-Object {
          $total++
          Write-Host "`n--- Example $($_.Name) ---" -ForegroundColor Cyan

          node runner.js $_.FullName
          if ($LASTEXITCODE -eq 0) {
            $success++
            Write-Host "✓ Ran successfully" -ForegroundColor Green
          } else {
            Write-Host "✗ Had errors" -ForegroundColor Yellow
          }
        }

        Write-Host "`n=== Summary ===" -ForegroundColor White
        Write-Host "Total examples: $total"
        Write-Host "Successfully ran: $success"
        Write-Host "Had errors: $($total - $success)"

        # Exit with error if none succeeded
        if ($success -eq 0) {
          exit 1
        }