name: Run Aspose Examples

on:
  push:
    branches: ["master", "main"]
  pull_request:
    branches: ["master", "main"]

jobs:
  test:
    runs-on: windows-latest

    env:
      ProductClientId: ${{ secrets.PRODUCTCLIENTID }}
      ProductClientSecret: ${{ secrets.PRODUCTCLIENTSECRET }}

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: "18"

    - name: Install dependencies
      run: |
        npm install
        npm install ts-node typescript @types/node --no-save

    - name: Create correct runner script
      run: |
        # Create runner.js with proper escaping
        $runnerContent = '// simple-example-runner.js
const exampleFile = process.argv[2];
console.log(`Running: ${exampleFile}`);

// Set environment
process.env.CellsCloudClientId = process.env.ProductClientId;
process.env.CellsCloudClientSecret = process.env.ProductClientSecret;
process.env.CellsCloudApiBaseUrl = "https://api.aspose.cloud/v3.0";

try {
  // Try to load the main module first
  const AsposeCellsCloud = require("../");
  global.AsposeCellsCloud = AsposeCellsCloud;
  global.model = AsposeCellsCloud;
  global.CellsApi = AsposeCellsCloud.CellsApi;

  // Run the example
  require("ts-node").register();
  require(exampleFile);
  console.log("Completed without throwing exception");
  process.exit(0);
} catch (error) {
  console.log("Error occurred:", error.message);
  process.exit(1);
}'

        # Write the content to file
        [System.IO.File]::WriteAllText("$pwd\runner.js", $runnerContent)
        echo "Runner script created"

        # Test the runner
        echo "Testing runner script..."
        node -c runner.js && echo "✓ Runner syntax is valid"

    - name: Run examples
      run: |
        $total = 0
        $success = 0

        echo "Starting to run examples..."

        Get-ChildItem Examples\*.ts | ForEach-Object {
          $total++
          $filename = $_.Name

          Write-Host "`n--- Example $filename ($total/347) ---" -ForegroundColor Cyan

          # Run the example
          node runner.js $_.FullName

          if ($LASTEXITCODE -eq 0) {
            $success++
            Write-Host "✓ Ran successfully" -ForegroundColor Green
          } else {
            Write-Host "✗ Had errors" -ForegroundColor Yellow
          }

          # Stop after 5 examples for testing
          if ($total -eq 5) {
            Write-Host "`nStopping after 5 examples for testing..." -ForegroundColor Magenta
            break
          }
        }

        Write-Host "`n=== Summary ===" -ForegroundColor White
        Write-Host "Total examples attempted: $total"
        Write-Host "Successfully ran: $success"
        Write-Host "Had errors: $($total - $success)"

        # Exit with error if none succeeded
        if ($success -eq 0) {
          exit 1
        }