name: Node.js CI

on:
  push:
    branches: ["master"]
  pull_request:
    branches: ["master"]

jobs:
  test-examples:
    runs-on: windows-latest

    env:
      ProductClientId: ${{ secrets.PRODUCTCLIENTID }}
      ProductClientSecret: ${{ secrets.PRODUCTCLIENTSECRET }}

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: "21"

    - name: Install dependencies
      run: npm install

    - name: Setup environment and run examples
      run: |
        $env:CellsCloudClientId = $env:ProductClientId
        $env:CellsCloudClientSecret = $env:ProductClientSecret
        $env:CellsCloudApiBaseUrl = "https://api.aspose.cloud/"

        npm install ts-node typescript @types/node --no-save

        $successCount = 0
        $exampleFiles = Get-ChildItem Examples\*.ts -ErrorAction SilentlyContinue


        foreach ($file in $exampleFiles) {
          Write-Host "`n=== run: $($file.Name) ===" -ForegroundColor Cyan

          try {
            npx ts-node $file.FullName
            Write-Host "success" -ForegroundColor Green
            $successCount++
          } catch {
            Write-Host "error: $($_.Exception.Message)" -ForegroundColor Red
          }
        }

        Write-Host "success: $successCount/$($exampleFiles.Count)"

        if ($successCount -lt $exampleFiles.Count) {
          exit 1
        }