- name: Run examples directly
  working-directory: ${{ github.workspace }}
  env:
    CellsCloudClientId: ${{ secrets.PRODUCTCLIENTID }}
    CellsCloudClientSecret: ${{ secrets.PRODUCTCLIENTSECRET }}
    CellsCloudApiBaseUrl: "https://api.aspose.cloud/"
  run: |

    npm install ts-node

    for file in Examples/*.ts; do
      echo "=== run $file ==="
      npx ts-node "$file" && echo "success" || echo "error"
      echo ""
    done